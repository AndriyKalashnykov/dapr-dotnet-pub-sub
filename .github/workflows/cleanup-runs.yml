name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  actions: write

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
          | jq -r \
              --arg cutoff "$CUTOFF" \
              --argjson keep "$KEEP_MINIMUM" \
              'sort_by(.createdAt) | reverse | .[$keep:] | .[] | select(.createdAt < $cutoff) | .databaseId' \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete caches from deleted/merged branches
        run: |
          set -euo pipefail
          # Get all cache keys grouped by ref
          gh api --paginate "/repos/${{ github.repository }}/actions/caches" \
            --jq '.actions_caches[] | "\(.id) \(.ref)"' \
          | while read -r id ref; do
              case "$ref" in
                refs/heads/main|refs/heads/master) continue ;;
              esac
              # Delete cache if branch no longer exists
              branch="${ref#refs/heads/}"
              if ! gh api "/repos/${{ github.repository }}/branches/${branch}" >/dev/null 2>&1; then
                echo "Deleting cache ${id} from stale ref ${ref}"
                gh api --method DELETE "/repos/${{ github.repository }}/actions/caches/${id}" || true
              fi
            done
