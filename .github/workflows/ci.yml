name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  # `docker` job needs id-token: write for cosign keyless OIDC signing AND
  # packages: write to push images to ghcr.io. Scoped to the docker job in
  # its own permissions block; everything else stays read-only.

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # needed for gitleaks history scan

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Build
        run: make build

  test:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Test
        run: make coverage-check

      - name: Upload coverage report
        # Skipped under nektos/act — act's artifact server rejects the v7 uploader's
        # mime_type field. Runs normally on GitHub-hosted runners.
        if: always() && env.ACT != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: tests/TestResults/
          if-no-files-found: warn
          retention-days: 7

  image-test:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - uses: jdx/mise-action@bfb9fa0b029db830a8c570757cee683df207a6c5 # v3
        with:
          install: true
          cache: true

      - name: Image-contract assertions (container-structure-test)
        run: make image-test

  image-scan:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Image scan (Trivy, fixed-only HIGH/CRITICAL)
        run: make image-scan

  e2e:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - name: E2E (Compose-based)
        run: make e2e

      - name: Dump Compose logs on failure
        if: failure()
        run: |
          docker compose --file compose/docker-compose.yml logs --no-color || true

  e2e-kind:
    needs: [changes, build, test]
    if: ${{ !failure() && !cancelled() && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-dotnet-cached

      - uses: jdx/mise-action@bfb9fa0b029db830a8c570757cee683df207a6c5 # v3
        with:
          install: true
          cache: true

      - name: Bring up KinD + Dapr + Kafka
        run: make kind-up

      - name: E2E (KinD)
        run: make e2e-kind

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl --context=kind-dapr-pubsub -n dapr-pubsub get pods,svc -o wide || true
          kubectl --context=kind-dapr-pubsub -n dapr-pubsub logs -l app=producer -c producer --tail=80 || true
          kubectl --context=kind-dapr-pubsub -n dapr-pubsub logs -l app=consumer -c consumer --tail=80 || true
          kubectl --context=kind-dapr-pubsub -n dapr-pubsub logs -l app=producer -c daprd --tail=80 || true
          kubectl --context=kind-dapr-pubsub -n dapr-pubsub logs -l app=consumer -c daprd --tail=80 || true

      - name: Tear down KinD
        if: always()
        run: make kind-down

  docker:
    needs: [changes, static-check, build, test, image-test, image-scan, e2e, e2e-kind]
    # Only build + push + sign on main pushes and on v* tags. Pull requests
    # do not push (the e2e job has already validated the image build).
    if: >-
      ${{ !failure() && !cancelled()
        && (needs.changes.outputs.code == 'true' || startsWith(github.ref, 'refs/tags/v'))
        && (github.event_name == 'push' || github.event_name == 'workflow_call')
        && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write   # cosign keyless OIDC
      packages: write   # push to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        service: [producer, consumer]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        id: build
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, image-test, image-scan, e2e, e2e-kind]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required jobs were cancelled"
            exit 1
          fi
