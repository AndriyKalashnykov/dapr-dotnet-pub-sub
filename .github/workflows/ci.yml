name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # needed for gitleaks history scan

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Static check
        run: make static-check

  build:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build
        run: make build

  test:
    needs: [static-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Test
        run: make test

  e2e:
    needs: [build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Run e2e tests
        run: make e2e

  ci-pass:
    if: always()
    needs: [static-check, build, test, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required jobs passed."
