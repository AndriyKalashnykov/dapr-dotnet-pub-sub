apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: message-pubsub-kafka
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "localhost:9092"
    - name: consumerGroup
      value: "order-group"
    - name: authType
      value: "none"
    - name: clientID
      value: "dapr-pubsub-client"
    - name: disableTls
      value: "true"
scopes:
  - producer
  - consumer