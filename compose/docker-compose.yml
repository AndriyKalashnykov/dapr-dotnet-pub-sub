name: dapr-pubsub-e2e

services:

  kafka:
    image: confluentinc/cp-kafka:8.2.0@sha256:acbbf674f2ed40e5d0a8ca51beb0f00692c866fc22b5ce06f8cadbdc54cd4436
    container_name: e2e-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: ERROR
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  placement:
    image: daprio/dapr:1.17.4@sha256:8e4da92d1e15a7aca7ecf416947d14d5a5db83ae502283219724d9608ff0e7d1
    container_name: e2e-placement
    command: ["./placement", "--port", "${PLACEMENT_PORT:-50006}"]

  jaeger:
    image: jaegertracing/jaeger:2.17.0@sha256:6266573208d665ce5c17483bce0a75d0806480d92c84766d288d0aee885ce708
    container_name: e2e-jaeger
    ports:
      - "${JAEGER_HOST_PORT:-16686}:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  producer:
    image: dapr-dotnet-pub-sub-producer:e2e
    build:
      context: ..
      dockerfile: producer/Dockerfile
      args:
        APP_INTERNAL_PORT: "${PRODUCER_APP_PORT:-5232}"
    container_name: e2e-producer
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${PRODUCER_HOST_PORT:-5232}:${PRODUCER_APP_PORT:-5232}"
    environment:
      DAPR_APP_PORT: "${PRODUCER_APP_PORT:-5232}"
      DAPR_HTTP_PORT: "${PRODUCER_DAPR_HTTP_PORT:-3532}"
      # App-side OpenTelemetry — the app's own HTTP spans export here so the real
      # /send flow is traced (complements the Dapr sidecar's pub/sub spans).
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}"
      OTEL_SERVICE_NAME: "producer"

  producer-dapr:
    image: daprio/daprd:1.17.4@sha256:d7041f5ada969802f7d2d125054b350769eeab90c8d52a99a5fb1805127945b2
    container_name: e2e-producer-dapr
    network_mode: "service:producer"
    depends_on:
      - producer
      - placement
      - kafka
      - jaeger
    volumes:
      - ./components:/components:ro
    command:
      - "./daprd"
      - "--app-id=producer"
      - "--app-port=${PRODUCER_APP_PORT:-5232}"
      - "--dapr-http-port=${PRODUCER_DAPR_HTTP_PORT:-3532}"
      - "--placement-host-address=placement:${PLACEMENT_PORT:-50006}"
      - "--resources-path=/components"
      - "--config=/components/config.yaml"
      - "--log-level=info"

  consumer:
    image: dapr-dotnet-pub-sub-consumer:e2e
    build:
      context: ..
      dockerfile: consumer/Dockerfile
      args:
        APP_INTERNAL_PORT: "${CONSUMER_APP_PORT:-5231}"
    container_name: e2e-consumer
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${CONSUMER_HOST_PORT:-5231}:${CONSUMER_APP_PORT:-5231}"
    environment:
      DAPR_APP_PORT: "${CONSUMER_APP_PORT:-5231}"
      DAPR_HTTP_PORT: "${CONSUMER_DAPR_HTTP_PORT:-3531}"
      # App-side OpenTelemetry — exports the consumer's handler spans.
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}"
      OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}"
      OTEL_SERVICE_NAME: "consumer"

  consumer-dapr:
    image: daprio/daprd:1.17.4@sha256:d7041f5ada969802f7d2d125054b350769eeab90c8d52a99a5fb1805127945b2
    container_name: e2e-consumer-dapr
    network_mode: "service:consumer"
    depends_on:
      - consumer
      - placement
      - kafka
      - jaeger
    volumes:
      - ./components:/components:ro
    command:
      - "./daprd"
      - "--app-id=consumer"
      - "--app-port=${CONSUMER_APP_PORT:-5231}"
      - "--dapr-http-port=${CONSUMER_DAPR_HTTP_PORT:-3531}"
      - "--placement-host-address=placement:${PLACEMENT_PORT:-50006}"
      - "--resources-path=/components"
      - "--config=/components/config.yaml"
      - "--log-level=info"

networks:
  default:
    name: dapr-pubsub-e2e
