schemaVersion: 2.0.0

# Container-structure-test assertions for the consumer image. Verifies the
# Dockerfile contract independently of runtime behaviour (which the e2e
# suite covers). Runs in CI as the `image-test` job parallel to e2e.

metadataTest:
  exposedPorts:
    - "5231"
  entrypoint:
    - dotnet
    - consumer.dll
  user: "1000:1000"
  envVars:
    - key: ASPNETCORE_URLS
      value: "http://+:5231"
    - key: DAPR_APP_PORT
      value: "5231"

fileExistenceTests:
  - name: consumer assembly present
    path: /app/consumer.dll
    shouldExist: true
  - name: common library present
    path: /app/common.dll
    shouldExist: true

commandTests:
  - name: dotnet ASP.NET Core runtime resolves
    command: dotnet
    args: ["--list-runtimes"]
    expectedOutput:
      - "Microsoft.AspNetCore.App 10\\."
