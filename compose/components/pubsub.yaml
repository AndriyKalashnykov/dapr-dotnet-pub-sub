apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: message-pubsub-kafka
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka:29092"
    - name: consumerGroup
      value: "order-group"
    - name: authType
      value: "none"
    - name: clientID
      value: "dapr-pubsub-client"
    - name: disableTls
      value: "true"
    # Read from the topic start so the e2e suite catches messages even if the
    # consumer's Kafka group rebalance lags publish — by default Dapr uses
    # 'newest', which silently drops messages published before the subscriber
    # finishes joining the group.
    - name: initialOffset
      value: "oldest"
scopes:
  - producer
  - consumer
