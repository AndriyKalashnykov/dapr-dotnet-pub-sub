version: 1
common:
  resourcesPaths:
    - components
  appLogDestination: fileAndConsole
  daprdLogDestination: fileAndConsole
  env:
    DEBUG: "true"
apps:
  # Producer app: publishes messages to Kafka
  - appID: producer
    appDirPath: producer
    appPort: 5232
    daprHTTPPort: 3532
    logLevel: "warn"
    command: [ "dotnet", "run" ]
  # Consumer app: subscribes to messages from Kafka
  - appID: consumer
    appDirPath: consumer
    appPort: 5231
    daprHTTPPort: 3531
    logLevel: "warn"
    command: [ "dotnet", "run" ]
